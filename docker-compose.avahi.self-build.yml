services:
  db:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/docker/whereisit/data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - whereisit_mdns

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: whereisit:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVICE_ADVERTISE_HOST: ${SERVICE_ADVERTISE_HOST:?please set SERVICE_ADVERTISE_HOST in .env}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /opt/docker/whereisit/data/uploads:/data/uploads
    networks:
      - whereisit_mdns

networks:
  whereisit_mdns:
    external: true
    name: whereisit_mdns
